<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YTRippx - YouTube Downloader</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Custom glass titlebar (frameless window) -->
  <div class="app-titlebar">
    <div class="app-titlebar-drag"></div>
    <span class="app-titlebar-title">&#9670; YTRippx</span>
    <div class="app-titlebar-controls">
      <button id="tbMinimize" class="tb-btn tb-minimize" title="Minimize">&#8722;</button>
      <button id="tbMaximize" class="tb-btn tb-maximize" title="Maximize">&#9633;</button>
      <button id="tbClose"    class="tb-btn tb-close"    title="Close">&#10005;</button>
    </div>
  </div>

  <!-- Frutiger Aero floating glass orbs -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="orb orb-4"></div>
  <div class="orb orb-5"></div>
  <div class="orb orb-6"></div>

  <div class="container">
    <header>
      <div class="sweep"></div>
      <div class="header-eyebrow">&#10022; &nbsp; Free &nbsp;&middot;&nbsp; Fast &nbsp;&middot;&nbsp; Open Source &nbsp; &#10022;</div>
      <h1><span class="title-yt">YT</span>Rippx</h1>
      <p>Download YouTube videos as MP3 or MP4</p>
      <div class="header-dots"><span></span><span></span><span></span><span></span><span></span></div>
    </header>

    <main>
      <section class="download-section">
        <div class="input-group">
          <input 
            type="text" 
            id="urlInput" 
            placeholder="Paste YouTube URL here..."
            class="url-input"
          >
          <button id="fetchBtn" class="btn btn-primary">Get Info</button>
        </div>

        <div id="videoInfo" class="video-info hidden">
          <img id="thumbnail" src="" alt="Video thumbnail" class="thumbnail">
          <div class="info-details">
            <h3 id="videoTitle"></h3>
            <p id="videoDuration"></p>
          </div>
        </div>

        <div id="optionsPanel" class="options-panel hidden">
          <div class="form-group">
            <label for="formatSelect">Format:</label>
            <select id="formatSelect">
              <option value="mp4">MP4 (Video)</option>
              <option value="mp3">MP3 (Audio)</option>
            </select>
          </div>

          <div class="form-group">
            <label for="qualitySelect">Quality:</label>
            <select id="qualitySelect">
              <option value="best">Best</option>
              <option value="720p">720p</option>
              <option value="480p">480p</option>
              <option value="360p">360p</option>
              <option value="144p">144p</option>
            </select>
          </div>

          <div class="form-group">
            <label for="outputPath">Download Location:</label>
            <div class="path-input-group">
              <input type="text" id="outputPath" readonly class="path-input" placeholder="Select a folder">
              <button id="browseBtn" class="btn btn-secondary">Browse</button>
            </div>
          </div>

          <div class="form-group">
            <label for="threadsSelect">&#9889; Download Threads:</label>
            <select id="threadsSelect">
              <option value="1">1 &mdash; Slowest (low bandwidth)</option>
              <option value="2">2 &mdash; Conservative</option>
              <option value="4" selected>4 &mdash; Balanced (default)</option>
              <option value="8">8 &mdash; Fast</option>
              <option value="16">16 &mdash; Fastest (high bandwidth)</option>
            </select>
          </div>

          <button id="downloadBtn" class="btn btn-success">Download</button>
        </div>

        <div id="progressContainer" class="progress-container hidden">
          <div class="progress-bar">
            <div id="progressFill" class="progress-fill"></div>
          </div>
          <p id="progressText">0%</p>
        </div>

        <div id="statusMessage" class="status-message hidden"></div>
      </section>

      <section class="history-section">
        <h2>Download History</h2>
        <div id="historyContainer" class="history-container">
          <p class="empty-message">No downloads yet</p>
        </div>
        <button id="clearHistoryBtn" class="btn btn-danger">Clear History</button>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
